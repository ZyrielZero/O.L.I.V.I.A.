# =============================================================================
# O.L.I.V.I.A. DELLA-Linear Merge Configuration v2
# Fixed: Template leakage, tokenizer collision, stop token handling
# =============================================================================

merge_method: della_linear
dtype: bfloat16

# Use Llama 3.1 BASE (not Instruct) as the foundation
base_model: meta-llama/Llama-3.1-8B

# CRITICAL FIX: Force tokenizer from base model only
# This prevents embedding collision from ChatML vs Llama 3 Instruct tokens
tokenizer_source: base

parameters:
  # Conservative epsilon for stability
  epsilon: 0.05
  # Standard lambda (scaling factor)
  lambda: 1.0
  # Memory optimization - improves results in practice
  int8_mask: true

models:
  # =========================================================================
  # ROLEPLAY CORE - Character consistency, personality, multi-turn coherency
  # Stheno uses Llama 3 Instruct format - our primary personality source
  # =========================================================================
  - model: Sao10K/Llama-3.1-8B-Stheno-v3.4
    parameters:
      weight: 0.30
      density: 0.70

  # =========================================================================
  # INSTRUCTION FOLLOWING - System prompt adherence, structured responses
  # Hermes uses ChatML format - potential collision source, but valuable
  # =========================================================================
  - model: NousResearch/Hermes-3-Llama-3.1-8B
    parameters:
      weight: 0.25
      density: 0.65

  # =========================================================================
  # NATURAL SPEECH - Avoid AI slop, human-like conversation patterns
  # Uses Llama 3 Instruct format - compatible with Stheno
  # =========================================================================
  - model: vicgalle/Humanish-Roleplay-Llama-3.1-8B
    parameters:
      weight: 0.20
      density: 0.60

  # =========================================================================
  # UNCENSORED - Remove excessive alignment/refusals
  # Dolphin uses ChatML format - another collision source
  # Reduced weight to minimize template interference
  # =========================================================================
  - model: cognitivecomputations/Dolphin3.0-Llama3.1-8B
    parameters:
      weight: 0.10
      density: 0.50

  # =========================================================================
  # REASONING - Chain-of-thought, logical responses
  # Nemotron uses Llama 3 Instruct format - compatible
  # =========================================================================
  - model: nvidia/Llama-3.1-Nemotron-Nano-8B-v1
    parameters:
      weight: 0.15
      density: 0.55