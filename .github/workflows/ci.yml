name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install PortAudio (sounddevice runtime)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch first so the torch floor resolves without the CUDA wheel
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run fast tests with coverage
        run: pytest tests/ -m "not slow and not gpu" -v --tb=short -x --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Run smoke tests
        run: pytest tests/smoke/ -v --tb=short

  benchmarks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      # CPU-safe micro-benchmarks only — GPU voice-pipeline numbers can never
      # come from CI; those come from tools/bench.py on the dev machine
      - name: Run micro-benchmarks
        run: pytest tests/benchmarks/test_micro.py --benchmark-json=benchmark.json -v

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check src/ tests/

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch first so the torch floor resolves without the CUDA wheel
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      # Triaged 2026-07-03. Ignored (each deferred or not applicable, not dismissed):
      # - transformers 4.57.6 (PYSEC-2025-217, CVE-2026-1839, CVE-2026-4372):
      #   fixes require the 5.x major bump, which must be validated against
      #   ChatterBox TTS on real hardware first
      # - chromadb PYSEC-2026-311: pre-auth code injection in the Chroma HTTP
      #   server API; OLIVIA embeds chromadb via PersistentClient and never
      #   runs that server, so the vulnerable surface is absent (no fix
      #   version released yet — re-check when one lands)
      # --strict is off because +cpu/+cu torch wheels aren't on PyPI and can't
      # be audited; real findings still fail the job.
      - name: Audit dependencies
        run: >
          pip-audit --desc --skip-editable
          --ignore-vuln PYSEC-2025-217
          --ignore-vuln CVE-2026-1839
          --ignore-vuln CVE-2026-4372
          --ignore-vuln PYSEC-2026-311
