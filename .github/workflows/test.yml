name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install PortAudio (sounddevice runtime)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch first so the torch floor resolves without the CUDA wheel
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run fast tests with coverage
        run: pytest tests/ -m "not slow" -v --tb=short -x --cov=src --cov-report=term-missing

      - name: Run smoke tests
        run: pytest tests/smoke/ -v --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check src/ tests/

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch first so the torch floor resolves without the CUDA wheel
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Audit dependencies
        run: pip-audit --strict --desc
        continue-on-error: true
